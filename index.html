<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwindcss  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Comet Digital</title>
    <style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
        }  
        h1, h2, h3 {
            font-family: 'Fraunces', serif;
        }
        * {
            &::-webkit-scrollbar {
                display: none;
            }
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

    </style>
</head>
<body>
    <main class="relative min-h-screen w-full overflow-hidden bg-cover bg-center bg-[url('./assets/1.png')] text-white">
        <div class="absolute inset-0 bg-gradient-to-r from-black/90 via-black/70 to-black/20"></div>

        <div class="relative mx-auto flex min-h-screen w-full max-w-7xl flex-col px-6 py-8 md:px-10 lg:px-16">
            <header class="mb-8 md:mb-10">
                <img src="./assets/logo.png" alt="Comet Digital" class="h-10 w-auto md:h-12">
            </header>

            <section class="mb-12 max-w-2xl md:mb-0">
                <h1 class="text-3xl leading-tight tracking-tight md:text-4xl lg:text-5xl">Ready to upgrade your tables?</h1>
                <p class="mt-5 max-w-lg text-base leading-relaxed text-white/90 md:text-lg">
                    Quickly boost your sales with illuminated table displays. Join the waitlist to be the first to know when this becomes available.
                </p>

                <form class="mb-8 mt-8 w-full max-w-md rounded-2xl border border-white/20 bg-black/45 p-5 backdrop-blur-sm md:p-6">
                    <label for="waitlist-email" class="mb-2 block text-sm font-medium text-white/90">Work email</label>
                    <input
                        id="waitlist-email"
                        name="email"
                        type="email"
                        placeholder="you@restaurant.com"
                        class="w-full rounded-lg border border-white/20 bg-white/90 px-4 py-3 text-sm text-slate-900 placeholder:text-slate-500 outline-none transition focus:border-white focus:ring-2 focus:ring-white/40"
                        required
                    >

                    <button
                        type="submit"
                        class="mt-5 w-full rounded-lg bg-[#9c5f21] px-4 py-3 text-sm font-semibold uppercase tracking-wide transition hover:bg-amber-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-800"
                    >
                        Join the waitlist
                    </button>

                    

                    <p class="mt-3 text-xs text-white/75">No spam. Just one email when we launch.</p>
                </form>
            </section>
            <div class="flex items-center gap-2">
                        <a href="#" aria-label="Instagram" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-white/30 bg-white/10 text-white transition hover:bg-white/20 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/50">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                                <rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect>
                                <circle cx="12" cy="12" r="4"></circle>
                                <circle cx="17.4" cy="6.6" r="1"></circle>
                            </svg>
                        </a>
                        <a href="#" aria-label="Facebook" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-white/30 bg-white/10 text-white transition hover:bg-white/20 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/50">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M13.6 21v-7.2H16l.4-2.8h-2.8V9.1c0-.8.2-1.4 1.4-1.4H16V5.2c-.3 0-1.1-.1-2.2-.1-2.2 0-3.7 1.3-3.7 3.9V11H8v2.8h2.1V21h3.5z"></path>
                            </svg>
                        </a>
                        <a href="#" aria-label="LinkedIn" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-white/30 bg-white/10 text-white transition hover:bg-white/20 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/50">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M6.2 8.8a1.9 1.9 0 1 1 0-3.8 1.9 1.9 0 0 1 0 3.8zM4.5 10.2H8V21H4.5V10.2zm5.6 0h3.3v1.5h.1c.5-.9 1.6-1.8 3.3-1.8 3.5 0 4.2 2.3 4.2 5.2V21h-3.5v-4.9c0-1.2 0-2.7-1.6-2.7s-1.9 1.3-1.9 2.6V21h-3.5V10.2z"></path>
                            </svg>
                        </a>
                        <a href="mailto:hello@cometdigital.com" aria-label="Email" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-white/30 bg-white/10 text-white transition hover:bg-white/20 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/50">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                                <rect x="3" y="6" width="18" height="12" rx="2"></rect>
                                <path d="M4 8l8 6 8-6"></path>
                            </svg>
                        </a>
                    </div>
        </div>
    </main>
    <div class=" w-full py-2 text-center text-sm text-white bg-black">
        <p>&copy; Comet Digital Ltd. Rwanda - All rights reserved.</p>
    </div>
</body>
</html>
